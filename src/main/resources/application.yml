spring:
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/erp_cashier
    username: postgres
    password: adminuser
    properties:
      preparedStatementCacheQueries: 0
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8081

app:
  r2dbc:
    rt:
      pool:
        max-size: 10
    thirdparty:
      pool:
        max-size: 10
  rt:
    base-url: ${RT_COMOPS_BASE_URL:http://localhost:8080}
  cashier-core:
    enabled: ${CASHIER_CORE_PROXY_ENABLED:true}
    base-url: ${CASHIER_CORE_BASE_URL:${RT_COMOPS_BASE_URL:http://localhost:8080}}
    # Mode pur proxy : tout /api/* relayé vers iwm (BFF sans logique/BD locale).
    # Activer après validation runtime (auth iwm + toutes les routes).
    passthrough-all: ${CASHIER_CORE_PASSTHROUGH_ALL:false}
  seed:
    superadmin:
      enabled: ${SEED_SUPERADMIN_ENABLED:true}
      username: ${SEED_SUPERADMIN_USERNAME:superadmin@gmail.com}
      password: ${SEED_SUPERADMIN_PASSWORD:qwerty}
      first-name: ${SEED_SUPERADMIN_FIRST_NAME:Super Admin}
    bills:
      enabled: ${SEED_BILLS_ENABLED:true}
  sync:
    rt:
      enabled: ${RT_SYNC_ENABLED:true}
      fixed-delay: ${RT_SYNC_FIXED_DELAY:PT1H}
      initial-delay: ${RT_SYNC_INITIAL_DELAY:PT1M}
      sync-on-login: ${RT_SYNC_ON_LOGIN:false}
      superadmin-email: ${RT_SYNC_SUPERADMIN_EMAIL:superadmin@gmail.com}
      superadmin-password: ${RT_SYNC_SUPERADMIN_PASSWORD:qwerty}
  external-stub:
    enabled: true
    require-organization-id: false
    require-agency-id: false
    organization:
      exists: true
      open: true
    credentials:
      valid: true
    agency:
      assigned: true
      open: true
    roles:
      cashier: true
      agency-admin: true
      organization-admin: true
      superadmin: true
  external:
    enabled: false
    require-organization-id: false
    require-agency-id: false
    organization:
      base-url: ""
      exists-path: "/organizations/{organizationId}/exists"
      open-path: "/organizations/{organizationId}/open"
      exists-field: "exists"
      open-field: "open"
    credentials:
      base-url: ""
      validate-path: "/auth/validate"
      valid-field: "valid"
      role-field: "role"
      role-type-field: "role_type"
    agency:
      base-url: ""
      assigned-path: "/agencies/{agencyId}/assignments/{userId}"
      open-path: "/agencies/{agencyId}/open"
      assigned-field: "assigned"
      open-field: "open"
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-me-please-32-chars-long}
    issuer: ${APP_JWT_ISSUER:erp-cashier}
    access-token-minutes: ${APP_JWT_ACCESS_TOKEN_MINUTES:1440}
  thirdparty:
    enabled: ${THIRDPARTY_ENABLED:true}
    base-url: ${THIRDPARTY_BASE_URL:http://localhost:8082}
    auth-path: ${THIRDPARTY_AUTH_PATH:/auth/login}
    accounts-path: ${THIRDPARTY_ACCOUNTS_PATH:/api/v1/thirdparty-accounts/by-agencies}
    email: ${THIRDPARTY_EMAIL:qwerty@gmail.com}
    password: ${THIRDPARTY_PASSWORD:qwerty}
    sync:
      enabled: ${THIRDPARTY_SYNC_ENABLED:true}
      fixed-delay: ${THIRDPARTY_SYNC_FIXED_DELAY:PT1H}
      initial-delay: ${THIRDPARTY_SYNC_INITIAL_DELAY:PT1M}
  accounting:
    enabled: ${ACCOUNTING_SYNC_ENABLED:true}
    base-url: ${ACCOUNTING_BASE_URL:https://yowyob-erp-backend-2duy.onrender.com}
    cash-movements-path: ${ACCOUNTING_CASH_MOVEMENTS_PATH:/api/v1/accounting/cash-movements}
    timeout-seconds: ${ACCOUNTING_TIMEOUT_SECONDS:5}
  billing:
    enabled: ${BILLING_ENABLED:true}
    base-url: ${BILLING_BASE_URL:https://billing-f6l8.onrender.com}
    all-bills-path: ${BILLING_ALL_BILLS_PATH:/all-bill}
    timeout-seconds: ${BILLING_TIMEOUT_SECONDS:5}
